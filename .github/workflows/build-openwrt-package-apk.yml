name: Build OpenWrt Package SDK (APK)

on:
  workflow_dispatch:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: build-apk (${{ matrix.target_name }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - target_name: xe3000-24.10
            openwrt_version: "24.10.0"
            target: "mediatek"
            subtarget: "filogic"
            sdk_toolchain: "gcc-13.3.0_musl"

    steps:
      - name: Checkout package source
        uses: actions/checkout@v5
        with:
          path: package-src

      - name: Install build dependencies
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential clang flex bison g++ gawk gcc-multilib g++-multilib \
            gettext git libncurses-dev libssl-dev python3-setuptools rsync swig \
            unzip zlib1g-dev file wget jq xz-utils zstd ca-certificates tar

      - name: Cache OpenWrt SDK
        id: cache-sdk
        uses: actions/cache@v5
        with:
          path: openwrt-sdk
          key: sdk-apk-${{ matrix.openwrt_version }}-${{ matrix.target }}-${{ matrix.subtarget }}-${{ matrix.sdk_toolchain }}

      - name: Download and extract OpenWrt SDK
        if: steps.cache-sdk.outputs.cache-hit != 'true'
        run: |
          set -euxo pipefail
          rm -rf openwrt-sdk sdk.tar.xz
          BASE_URL="https://downloads.openwrt.org/releases/${{ matrix.openwrt_version }}/targets/${{ matrix.target }}/${{ matrix.subtarget }}"
          wget --tries=3 --timeout=30 -O sha256sums "$BASE_URL/sha256sums" || true
          if [ -s sha256sums ]; then
            SDK_FILE="$(grep -oE "openwrt-sdk-${{ matrix.openwrt_version }}-${{ matrix.target }}-${{ matrix.subtarget }}_[^[:space:]]+\.Linux-x86_64\.tar\.xz" sha256sums | head -n1 || true)"
          fi
          if [ -z "${SDK_FILE:-}" ]; then
            SDK_FILE="openwrt-sdk-${{ matrix.openwrt_version }}-${{ matrix.target }}-${{ matrix.subtarget }}_${{ matrix.sdk_toolchain }}.Linux-x86_64.tar.xz"
          fi
          SDK_URL="$BASE_URL/$SDK_FILE"
          wget --tries=3 --timeout=300 -O sdk.tar.xz "$SDK_URL"
          test -s sdk.tar.xz
          mkdir -p openwrt-sdk
          tar -xf sdk.tar.xz -C openwrt-sdk --strip-components=1
          rm -f sdk.tar.xz

      - name: Detect package directory and name
        id: pkg
        run: |
          set -euxo pipefail
          PKG_MAKEFILE="$(grep -rlE '^\s*\$\(eval \$\(call BuildPackage' package-src --include=Makefile | head -n1)"
          test -n "$PKG_MAKEFILE" || { echo "::error::Could not find an OpenWrt package Makefile"; exit 1; }
          PKG_DIR="$(dirname "$PKG_MAKEFILE")"
          PKG_NAME="$(sed -n 's/^PKG_NAME:=\s*//p' "$PKG_MAKEFILE" | head -n1)"
          test -n "$PKG_NAME" || { echo "::error::PKG_NAME not found in $PKG_MAKEFILE"; exit 1; }
          echo "pkg_dir=$PKG_DIR" >> "$GITHUB_OUTPUT"
          echo "pkg_name=$PKG_NAME" >> "$GITHUB_OUTPUT"

      - name: Stage package into SDK
        run: |
          set -euxo pipefail
          PKG_NAME="${{ steps.pkg.outputs.pkg_name }}"
          PKG_SRC="$GITHUB_WORKSPACE/${{ steps.pkg.outputs.pkg_dir }}"
          DEST="openwrt-sdk/package/$PKG_NAME"
          rm -rf "$DEST"
          mkdir -p "$DEST"
          rsync -a --delete --exclude '.git' --exclude '.github' "$PKG_SRC"/ "$DEST"/

      - name: Update and install feeds
        working-directory: openwrt-sdk
        run: |
          set -euxo pipefail
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Prepare build config (APK)
        working-directory: openwrt-sdk
        run: |
          set -euxo pipefail
          PKG_NAME="${{ steps.pkg.outputs.pkg_name }}"
          translation_pkg="${PKG_NAME#luci-app-}"
          {
            echo "CONFIG_PACKAGE_${PKG_NAME}=m"
            echo "CONFIG_PACKAGE_luci-i18n-${translation_pkg}-zh-cn=m"
            echo "CONFIG_LUCI_LANG_zh_Hans=y"
            echo "CONFIG_USE_APK=y"
            echo "CONFIG_USE_OPKG=n"
          } > .config
          make defconfig
          grep -q '^CONFIG_USE_APK=y' .config || { echo "::error::This SDK does not support CONFIG_USE_APK=y"; exit 1; }

      - name: Compile package (APK)
        working-directory: openwrt-sdk
        run: |
          set -euxo pipefail
          make "package/${{ steps.pkg.outputs.pkg_name }}/compile" -j1 V=s

      - name: Collect artifacts (APK only)
        id: collect
        working-directory: openwrt-sdk
        run: |
          set -euxo pipefail
          PKG_NAME="${{ steps.pkg.outputs.pkg_name }}"
          translation_pkg="${PKG_NAME#luci-app-}"
          mkdir -p "$GITHUB_WORKSPACE/artifacts"
          mapfile -t PKGS < <(find ./bin/packages -type f \( -name "${PKG_NAME}*.apk" -o -name "luci-i18n-${translation_pkg}-*.apk" \))
          test "${#PKGS[@]}" -gt 0 || { echo "::error::No .apk packages were produced"; find ./bin/packages -type f | head -n 200; exit 1; }
          for f in "${PKGS[@]}"; do
            cp "$f" "$GITHUB_WORKSPACE/artifacts/"
          done
          ( cd "$GITHUB_WORKSPACE/artifacts" && sha256sum *.apk > SHA256SUMS )
          PRIMARY_PKG="$(find "$GITHUB_WORKSPACE/artifacts" -type f -name "${PKG_NAME}_*.apk" -exec basename {} \; | head -n1)"
          test -n "$PRIMARY_PKG" || PRIMARY_PKG="$(find "$GITHUB_WORKSPACE/artifacts" -type f -name "*.apk" -exec basename {} \; | head -n1)"
          echo "primary_pkg=$PRIMARY_PKG" >> "$GITHUB_OUTPUT"

      - name: Validate generated package format (APK)
        run: |
          set -euo pipefail
          PKG_FILE="artifacts/${{ steps.collect.outputs.primary_pkg }}"
          test -f "$PKG_FILE" || { echo "::error::Expected package not found: $PKG_FILE"; exit 1; }
          tar -tf "$PKG_FILE" | grep -q '^.PKGINFO$' || { echo "::error::Missing .PKGINFO in APK package"; exit 1; }

      - name: Upload package artifact (APK)
        uses: actions/upload-artifact@v5
        with:
          name: openwrt-apk-${{ steps.collect.outputs.primary_pkg }}
          path: |
            artifacts/*.apk
            artifacts/SHA256SUMS
          if-no-files-found: error
