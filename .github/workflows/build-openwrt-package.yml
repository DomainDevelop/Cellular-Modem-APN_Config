name: Build OpenWrt Package

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# Cancel superseded runs on the same ref to keep feedback fast and clean.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: build (${{ matrix.target_name }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          # Default, XE-3000 class target (OpenWrt 23.05.5 mediatek/filogic).
          - target_name: xe3000
            openwrt_version: "23.05.5"
            target: "mediatek"
            subtarget: "filogic"
            pkg_arch: "aarch64_cortex-a53"
            sdk_toolchain: "gcc-12.3.0_musl"
          # OpenWrt 24.10.0 for apk package generation.
          - target_name: xe3000-apk
            openwrt_version: "24.10.0"
            target: "mediatek"
            subtarget: "filogic"
            pkg_arch: "aarch64_cortex-a53"
            sdk_toolchain: "gcc-13.3.0_musl"

    steps:
      - name: Checkout package source
        uses: actions/checkout@v5
        with:
          path: package-src

      - name: Install build dependencies
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential clang flex bison g++ gawk gcc-multilib g++-multilib \
            gettext git libncurses-dev libssl-dev python3-setuptools rsync swig \
            unzip zlib1g-dev file wget jq xz-utils zstd ca-certificates

      - name: Cache OpenWrt SDK
        id: cache-sdk
        uses: actions/cache@v5
        with:
          path: openwrt-sdk
          key: sdk-${{ matrix.openwrt_version }}-${{ matrix.target }}-${{ matrix.subtarget }}-${{ matrix.sdk_toolchain }}

      - name: Download and extract OpenWrt SDK
        if: steps.cache-sdk.outputs.cache-hit != 'true'
        run: |
          set -euxo pipefail
          rm -rf openwrt-sdk sdk.tar.xz
          BASE_URL="https://downloads.openwrt.org/releases/${{ matrix.openwrt_version }}/targets/${{ matrix.target }}/${{ matrix.subtarget }}"
          wget --tries=3 --timeout=30 -O sha256sums "$BASE_URL/sha256sums" || true
          
          if [ -s sha256sums ]; then
            SDK_FILE=$(grep -oE "openwrt-sdk-${{ matrix.openwrt_version }}-${{ matrix.target }}-${{ matrix.subtarget }}_.*\.Linux-x86_64\.tar\.xz" sha256sums | head -n1 || true)
          fi
          
          if [ -z "${SDK_FILE:-}" ]; then
            SDK_FILE="openwrt-sdk-${{ matrix.openwrt_version }}-${{ matrix.target }}-${{ matrix.subtarget }}_${{ matrix.sdk_toolchain }}.Linux-x86_64.tar.xz"
          fi
          
          SDK_URL="$BASE_URL/$SDK_FILE"
          echo "Downloading SDK: $SDK_URL"
          wget --tries=3 --timeout=300 -O sdk.tar.xz "$SDK_URL"
          test -s sdk.tar.xz
          mkdir -p openwrt-sdk
          tar -xf sdk.tar.xz -C openwrt-sdk --strip-components=1
          rm -f sdk.tar.xz

      - name: Detect package directory and name
        id: pkg
        run: |
          set -euxo pipefail
          # Find the Makefile that declares the OpenWrt package (BuildPackage call).
          PKG_MAKEFILE="$(grep -rlE '^\s*\$\(eval \$\(call BuildPackage' package-src --include=Makefile | head -n1)"
          test -n "$PKG_MAKEFILE" || { echo "::error::Could not find an OpenWrt package Makefile (BuildPackage) in the repository"; exit 1; }
          PKG_DIR="$(dirname "$PKG_MAKEFILE")"
          PKG_NAME="$(sed -n 's/^PKG_NAME:=\s*//p' "$PKG_MAKEFILE" | head -n1)"
          test -n "$PKG_NAME" || { echo "::error::PKG_NAME not found in $PKG_MAKEFILE"; exit 1; }
          echo "Detected package '$PKG_NAME' in '$PKG_DIR'"
          echo "pkg_dir=$PKG_DIR" >> "$GITHUB_OUTPUT"
          echo "pkg_name=$PKG_NAME" >> "$GITHUB_OUTPUT"

      - name: Stage package into a custom feed
        run: |
          set -euxo pipefail
          # OpenWrt feeds expect a parent directory that CONTAINS package
          # subdirectories. The repository root IS the package, so we place it
          # inside a dedicated feed directory under its package name.
          FEED_DIR="$GITHUB_WORKSPACE/custom-feed"
          PKG_NAME="${{ steps.pkg.outputs.pkg_name }}"
          PKG_SRC="$GITHUB_WORKSPACE/${{ steps.pkg.outputs.pkg_dir }}"
          rm -rf "$FEED_DIR"
          mkdir -p "$FEED_DIR/$PKG_NAME"
          # Copy the package sources (Makefile + files), excluding VCS/CI metadata.
          rsync -a --delete \
            --exclude '.git' --exclude '.github' \
            "$PKG_SRC"/ "$FEED_DIR/$PKG_NAME"/
          echo "src-link custom $FEED_DIR" > openwrt-sdk/feeds.conf.default

      - name: Update and install feeds
        working-directory: openwrt-sdk
        run: |
          set -euxo pipefail
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Compile package
        working-directory: openwrt-sdk
        run: |
          set -euxo pipefail
          make defconfig
          # Build only the target package; -j1 + V=s gives clear, fail-fast logs.
          make "package/${{ steps.pkg.outputs.pkg_name }}/compile" -j1 V=s

      - name: Collect artifacts
        id: collect
        run: |
          set -euxo pipefail
          mkdir -p artifacts
          # Gather every generated .ipk and .apk from the SDK output tree.
          mapfile -t PKGS < <(find openwrt-sdk/bin -type f \( -name '*.ipk' -o -name '*.apk' \))
          test "${#PKGS[@]}" -gt 0 || { echo "::error::No .ipk or .apk files were produced by the build"; exit 1; }
          for f in "${PKGS[@]}"; do
            echo "Found package: $f"
            cp "$f" artifacts/
          done
          ( cd artifacts && sha256sum *.*pk > SHA256SUMS )
          # Primary package file name (used for the artifact name).
          PRIMARY_PKG="$(cd artifacts && ls ${{ steps.pkg.outputs.pkg_name }}_*.*pk 2>/dev/null | head -n1)"
          test -n "$PRIMARY_PKG" || PRIMARY_PKG="$(cd artifacts && ls *.*pk | head -n1)"
          echo "primary_pkg=$PRIMARY_PKG" >> "$GITHUB_OUTPUT"
          cat > artifacts/INSTALL.txt <<EOF
          Offline install of $PRIMARY_PKG on an OpenWrt router
          =====================================================

          Option A - LuCI web upload (no SSH required):
            1. Log in to LuCI (the router web UI) as admin.
            2. Go to System -> Software.
            3. Click "Upload Package..." and select the .ipk or .apk file from this artifact.
            4. Confirm the install. Refresh LuCI; the new menu entry appears afterwards.

          Option B - CLI over SSH / USB:
            1. Copy the package to the router (scp or USB storage), e.g. to /tmp.
            2. Install it:
               - For OpenWrt <= 23.05 (ipk):
                 opkg install /tmp/$PRIMARY_PKG
               - For OpenWrt >= 24.10 (apk):
                 apk add --allow-untrusted /tmp/$PRIMARY_PKG
            3. If dependencies are missing and the router has internet:
               - For ipk: opkg update && opkg install /tmp/$PRIMARY_PKG
               - For apk: apk update && apk add --allow-untrusted /tmp/$PRIMARY_PKG

          Verify integrity before installing (optional):
            sha256sum -c SHA256SUMS
          EOF

      - name: Validate generated package format
        run: |
          set -euo pipefail
          PKG_FILE="artifacts/${{ steps.collect.outputs.primary_pkg }}"
          test -f "$PKG_FILE" || { echo "::error::Expected package not found: $PKG_FILE"; exit 1; }
          
          if [[ "$PKG_FILE" == *.ipk ]]; then
            command -v ar >/dev/null 2>&1 || { echo "::error::'ar' tool is required to validate .ipk archive format"; exit 1; }
            AR_ENTRIES="$(ar t "$PKG_FILE")"
            printf '%s\n' "$AR_ENTRIES" | grep -qx "debian-binary" || { echo "::error::Missing debian-binary in package"; exit 1; }
            printf '%s\n' "$AR_ENTRIES" | grep -Eq "^control\.tar" || { echo "::error::Missing control.tar.* in package"; exit 1; }
            printf '%s\n' "$AR_ENTRIES" | grep -Eq "^data\.tar" || { echo "::error::Missing data.tar.* in package"; exit 1; }
            echo "Package format OK: $PKG_FILE"
          elif [[ "$PKG_FILE" == *.apk ]]; then
            tar -tf "$PKG_FILE" | grep -q '^\.PKGINFO' || { echo "::error::Missing .PKGINFO in package"; exit 1; }
            echo "APK Package format OK: $PKG_FILE"
          else
            echo "::error::Unknown package extension: $PKG_FILE"
            exit 1
          fi

      - name: Upload package artifact
        uses: actions/upload-artifact@v5
        with:
          name: openwrt-pkg-${{ steps.collect.outputs.primary_pkg }}
          path: |
            artifacts/*.*pk
            artifacts/SHA256SUMS
            artifacts/INSTALL.txt
          if-no-files-found: error
