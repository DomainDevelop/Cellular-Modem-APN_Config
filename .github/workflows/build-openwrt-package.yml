name: Build OpenWrt Package

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# Cancel superseded runs on the same ref to keep feedback fast and clean.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: build (${{ matrix.target_name }}, ${{ matrix.openwrt_version }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          # Primary, XE-3000 class target on the newest OpenWrt 24.10 (.ipk / opkg).
          - target_name: xe3000
            openwrt_version: "24.10.7"
            target: "mediatek"
            subtarget: "filogic"
            pkg_arch: "aarch64_cortex-a53"
            sdk_toolchain: "gcc-13.3.0_musl"
            pkg_format: "ipk"
          # Latest OpenWrt 25.12 release (.apk / apk package manager).
          - target_name: xe3000
            openwrt_version: "25.12.5"
            target: "mediatek"
            subtarget: "filogic"
            pkg_arch: "aarch64_cortex-a53"
            sdk_toolchain: "gcc-14.3.0_musl"
            pkg_format: "apk"

    steps:
      - name: Checkout package source
        uses: actions/checkout@v4
        with:
          path: package-src

      - name: Install build dependencies
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential clang flex bison g++ gawk gcc-multilib g++-multilib \
            gettext git libncurses-dev libssl-dev python3-setuptools rsync swig \
            unzip zlib1g-dev file wget jq xz-utils zstd ca-certificates

      - name: Cache OpenWrt SDK
        id: cache-sdk
        uses: actions/cache@v4
        with:
          path: openwrt-sdk
          key: sdk-${{ matrix.openwrt_version }}-${{ matrix.target }}-${{ matrix.subtarget }}-${{ matrix.sdk_toolchain }}

      - name: Download and extract OpenWrt SDK
        if: steps.cache-sdk.outputs.cache-hit != 'true'
        run: |
          set -euxo pipefail
          rm -rf openwrt-sdk sdk.tar.zst
          # OpenWrt 24.10+ ships the SDK as a zstd-compressed tarball.
          SDK_URL="https://downloads.openwrt.org/releases/${{ matrix.openwrt_version }}/targets/${{ matrix.target }}/${{ matrix.subtarget }}/openwrt-sdk-${{ matrix.openwrt_version }}-${{ matrix.target }}-${{ matrix.subtarget }}_${{ matrix.sdk_toolchain }}.Linux-x86_64.tar.zst"
          echo "Downloading SDK: $SDK_URL"
          wget --tries=3 --timeout=300 -O sdk.tar.zst "$SDK_URL"
          test -s sdk.tar.zst
          mkdir -p openwrt-sdk
          tar --zstd -xf sdk.tar.zst -C openwrt-sdk --strip-components=1
          rm -f sdk.tar.zst

      - name: Detect package directory and name
        id: pkg
        run: |
          set -euxo pipefail
          # Find the Makefile that declares the OpenWrt package (BuildPackage call).
          PKG_MAKEFILE="$(grep -rlE '^\s*\$\(eval \$\(call BuildPackage' package-src --include=Makefile | head -n1)"
          test -n "$PKG_MAKEFILE" || { echo "::error::Could not find an OpenWrt package Makefile (BuildPackage) in the repository"; exit 1; }
          PKG_DIR="$(dirname "$PKG_MAKEFILE")"
          PKG_NAME="$(sed -n 's/^PKG_NAME:=\s*//p' "$PKG_MAKEFILE" | head -n1)"
          test -n "$PKG_NAME" || { echo "::error::PKG_NAME not found in $PKG_MAKEFILE"; exit 1; }
          echo "Detected package '$PKG_NAME' in '$PKG_DIR'"
          echo "pkg_dir=$PKG_DIR" >> "$GITHUB_OUTPUT"
          echo "pkg_name=$PKG_NAME" >> "$GITHUB_OUTPUT"

      - name: Stage package into the SDK
        run: |
          set -euxo pipefail
          # The repository root IS the package. Stage it directly under the SDK's
          # package/ directory so it is discovered alongside the default feeds
          # (base, luci, packages...), which provide its runtime dependencies.
          PKG_NAME="${{ steps.pkg.outputs.pkg_name }}"
          PKG_SRC="$GITHUB_WORKSPACE/${{ steps.pkg.outputs.pkg_dir }}"
          DEST="openwrt-sdk/package/$PKG_NAME"
          rm -rf "$DEST"
          mkdir -p "$DEST"
          # Copy the package sources (Makefile + files), excluding VCS/CI metadata.
          rsync -a --delete \
            --exclude '.git' --exclude '.github' \
            "$PKG_SRC"/ "$DEST"/

      - name: Update and install feeds
        working-directory: openwrt-sdk
        run: |
          set -euxo pipefail
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Compile package
        working-directory: openwrt-sdk
        run: |
          set -euxo pipefail
          make defconfig
          # Build only the target package; -j1 + V=s gives clear, fail-fast logs.
          make "package/${{ steps.pkg.outputs.pkg_name }}/compile" -j1 V=s

      - name: Collect package artifacts
        id: collect
        shell: bash
        run: |
          set -euxo pipefail
          PKG_NAME="${{ steps.pkg.outputs.pkg_name }}"
          EXT="${{ matrix.pkg_format }}"
          mkdir -p artifacts
          # Gather every generated package of the expected format from the SDK output tree.
          mapfile -t PKGS < <(find openwrt-sdk/bin -type f -name "*.${EXT}")
          test "${#PKGS[@]}" -gt 0 || { echo "::error::No .${EXT} files were produced by the build"; exit 1; }
          for f in "${PKGS[@]}"; do
            echo "Found package: $f"
            cp "$f" artifacts/
          done
          ( cd artifacts && sha256sum *."${EXT}" > SHA256SUMS )
          # Primary package file name (used for the artifact name). Package files
          # are named "<pkg>_<ver>_<arch>.ipk" or "<pkg>-<ver>.apk".
          PRIMARY_PKG="$(cd artifacts && ls | grep -E "^${PKG_NAME}[-_].*\.${EXT}$" | head -n1 || true)"
          test -n "$PRIMARY_PKG" || PRIMARY_PKG="$(cd artifacts && ls *."${EXT}" | head -n1)"
          echo "primary_pkg=$PRIMARY_PKG" >> "$GITHUB_OUTPUT"
          if [ "$EXT" = "ipk" ]; then
            INSTALL_CMD="opkg install /tmp/$PRIMARY_PKG"
            UPDATE_CMD="opkg update && opkg install /tmp/$PRIMARY_PKG"
          else
            INSTALL_CMD="apk add --allow-untrusted /tmp/$PRIMARY_PKG"
            UPDATE_CMD="apk update && apk add --allow-untrusted /tmp/$PRIMARY_PKG"
          fi
          cat > artifacts/INSTALL.txt <<EOF
          Offline install of $PRIMARY_PKG on an OpenWrt router
          =====================================================

          Option A - LuCI web upload (no SSH required):
            1. Log in to LuCI (the router web UI) as admin.
            2. Go to System -> Software.
            3. Click "Upload Package..." and select the package file from this artifact.
            4. Confirm the install. Refresh LuCI; the new menu entry appears afterwards.

          Option B - command line over SSH / USB:
            1. Copy the package to the router (scp or USB storage), e.g. to /tmp.
            2. Install it:
                 $INSTALL_CMD
            3. If dependencies are missing and the router has internet:
                 $UPDATE_CMD

          Verify integrity before installing (optional):
            sha256sum -c SHA256SUMS
          EOF

      - name: Validate generated package format
        run: |
          set -euo pipefail
          EXT="${{ matrix.pkg_format }}"
          PKG_FILE="artifacts/${{ steps.collect.outputs.primary_pkg }}"
          test -f "$PKG_FILE" || { echo "::error::Expected package not found: $PKG_FILE"; exit 1; }
          if [ "$EXT" = "ipk" ]; then
            # An .ipk is an ar archive containing debian-binary, control.tar.*, data.tar.*.
            command -v ar >/dev/null 2>&1 || { echo "::error::'ar' tool is required to validate .ipk archive format"; exit 1; }
            AR_ENTRIES="$(ar t "$PKG_FILE")"
            printf '%s\n' "$AR_ENTRIES" | grep -qx "debian-binary" || { echo "::error::Missing debian-binary in package"; exit 1; }
            printf '%s\n' "$AR_ENTRIES" | grep -Eq "^control\.tar" || { echo "::error::Missing control.tar.* in package"; exit 1; }
            printf '%s\n' "$AR_ENTRIES" | grep -Eq "^data\.tar" || { echo "::error::Missing data.tar.* in package"; exit 1; }
          else
            # An .apk (apk v3) is a gzip-compressed archive; verify integrity.
            gzip -t "$PKG_FILE" || { echo "::error::.apk package failed gzip integrity check"; exit 1; }
          fi
          echo "Package format OK: $PKG_FILE"

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-${{ matrix.pkg_format }}-${{ matrix.openwrt_version }}-${{ matrix.target_name }}
          path: |
            artifacts/*.ipk
            artifacts/*.apk
            artifacts/SHA256SUMS
            artifacts/INSTALL.txt
          if-no-files-found: error
