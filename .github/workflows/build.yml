
# .github/workflows/build.yml

name: Build OpenWrt Package (using SDK)

on:
  push:
    branches: [ "main", "master" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

# ======================================================================================
# ==                        👇 User configuration area 👇                            ==
# ======================================================================================
env:
  # 1. Set the name of the package you want to compile (it must be the same as your package directory name).
  # For example: Luci-App-Adguardhome, V2ray-Core, KMOD-Wireguard, etc.
  # 1. 设置你要编译的软件包名称 (必须与你的软件包目录名相同)
  #    例如: luci-app-adguardhome, v2ray-core, kmod-wireguard 等
  PACKAGE_NAME: luci-app-ginet-cellmodem

  # 2. Set the version of OpenWrt to compile (it must be the official release label, such as' v23.05.3').
  # Note: this method does not support' master' or' openwrt-23.05' and other branch names.
  # 2. 设置要编译的 OpenWrt 版本 (必须是官方的正式发布版标签, 例如 'v23.05.3')
  #    注意：此方法不支持 'master' 或 'openwrt-23.05' 等分支名
  OPENWRT_VERSION: 'v23.05.5'

  # 3. Specify the SDK save directory, generally without modification.
  # 3. 指定SDK保存目录，一般不用修改
  SDK_DIR: /home/runner/work/openwrt-sdk

  # 4. Pinned commit of DomainDevelop/openwrt-ipk2apk used to convert IPK to APK.
  #    Update this SHA when you want to pull in upstream converter changes.
  #    Pinned to: main branch HEAD as of 2026-07-23 (adds APK v2 PAX SHA1 support)
  IPK2APK_CONVERTER_REF: "60caa88a2c5907dc76884b58742304161d644480"
# ======================================================================================
# ==                        👆 User configuration area 👆                            ==
# ======================================================================================

permissions:
  contents: write

jobs:
  build:
    name: Build for ${{ matrix.target.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          # The compiled path is found here in https://downloads.openwrt.org/releases/24.10.3/targets, and the name is anything.
          # 编译的path在https://downloads.openwrt.org/releases/24.10.3/targets 这里查找，name随意
          - name: x86_64
            path: x86/64
          - name: mediatek_filogic
            path: mediatek/filogic
          - name: mips_mt7621
            path: ramips/mt7621

    steps:
      # 步骤 1: 检出代码
      - name: Checkout package repository
        uses: actions/checkout@v5

      # 步骤 2: 安装依赖
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential rsync unzip zstd python3-cryptography

      # 步骤 3: 缓存 OpenWrt SDK
      # 缓存已下载和初步设置好的 SDK 目录。
      - name: Cache OpenWrt SDK
        id: cache-sdk
        uses: actions/cache@v5
        with:
          # 需要缓存的目录路径
          path: ${{ env.SDK_DIR }}
          # 缓存键：结合操作系统、目标架构和 OpenWrt 版本，确保环境变化时缓存失效
          key: ${{ runner.os }}-sdk-${{ matrix.target.name }}-${{ env.OPENWRT_VERSION }}

      # 步骤 4: 准备 SDK (仅在缓存未命中时运行)
      # 这个组合步骤包含了下载、解压 SDK 和更新 feeds，因为这些都是 SDK 准备过程的一部分，应该一起被缓存。
      - name: Download, extract OpenWrt SDK and update feeds
        if: steps.cache-sdk.outputs.cache-hit != 'true'
        run: |
          # 从环境变量中移除 'v' 前缀以匹配版本号
          release_version="${OPENWRT_VERSION#v}"
          sdk_url_prefix="https://downloads.openwrt.org/releases/${release_version}/targets/${{ matrix.target.path }}"
          
          # 查找 SDK 文件名
          sdk_filename=$(curl -s "$sdk_url_prefix/" | \
                        grep -o '<a href="openwrt-sdk-.*-x86_64\.tar\.\(xz\|zst\)">' | \
                        sed -e 's/.*<a href="//' -e 's/">//' | \
                        head -n 1)

          if [ -z "$sdk_filename" ]; then
            echo "::error::Could not find SDK file at ${sdk_url_prefix}/"
            echo "Available files:"
            curl -s "$sdk_url_prefix/" | grep -o '<a href="[^"]*">[^<]*</a>' | sed -e 's/<a href="\(.*\)".*>\(.*\)/\1\t\2/'
            exit 1
          fi
          
          echo "Downloading SDK: ${sdk_url_prefix}/${sdk_filename}"
          wget -q "${sdk_url_prefix}/${sdk_filename}"
          
          echo "Extracting SDK..."
          # 解压 SDK 并重命名为固定的目录名，以匹配缓存路径
          tar -xf "$sdk_filename"
          mv $(find . -maxdepth 1 -type d -name 'openwrt-sdk-*') ${{ env.SDK_DIR }}

          echo "Updating feeds..."
          cd ${{ env.SDK_DIR }}
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          cd ..

      # 步骤 5: 准备构建环境 (包含智能版本控制)
      - name: Prepare build environment
        working-directory: ${{ env.SDK_DIR }}
        run: |
          rm -rf package/${PACKAGE_NAME}
          mkdir -p package/${PACKAGE_NAME}
          src_dir="${{ github.workspace }}"

          echo "Searching for Makefile in: $src_dir"
          # 查找 Makefile，最大深度3，按路径长度排序，优先取最短路径的(通常是根目录的)
          # 过滤掉路径中包含 /bin/ 或 /obj/ 的干扰项
          FOUND_MK=$(find "$src_dir" -maxdepth 3 -name Makefile -not -path "*/.*" | awk '{ print length, $0 }' | sort -n | cut -d" " -f2- | head -n 1)
          
          if [ -z "$FOUND_MK" ]; then
            echo "::error::Could not find any Makefile in the repository!"
            ls -R "$src_dir"
            exit 1
          fi
          
          echo "Found primary Makefile at: $FOUND_MK"
          pkg_src_dir=$(dirname "$FOUND_MK")
          echo "Determined package source root: $pkg_src_dir"

          rsync -a --delete "${pkg_src_dir}/" ./package/${PACKAGE_NAME}/
          
          # 验证复制结果
          TARGET_MK="./package/${PACKAGE_NAME}/Makefile"
          if [ ! -f "$TARGET_MK" ]; then
            echo "::error::Failed to migrate code. Makefile missing at $TARGET_MK"
            ls -R package/${PACKAGE_NAME}
            exit 1
          fi
          echo "Code migration successful. Structure verified."
          
          # 检查 Makefile 中是否已存在 PKG_VERSION 定义
          if grep -q "^PKG_VERSION:=" "$TARGET_MK"; then
            echo "Static PKG_VERSION found in Makefile. Using upstream version definition."
            echo "::notice::You should not manually define PKG_VERSION or PKG_RELEASE in the Makefile. You should try using dynamic versioning."
          else
            echo "No static PKG_VERSION found. Applying dynamic versioning."
            
            NEW_VER=""
            NEW_REL=""

            if [ "${{ github.ref_type }}" = "tag" ]; then
              # === 场景 A: Release Tag ===
              NEW_VER=$(echo "${{ github.ref_name }}" | sed 's/^v//')
              NEW_REL="1"
              echo "Build triggered by Tag: Using Version=$NEW_VER, Release=$NEW_REL"
            else
              # === 场景 B: 普通 Commit (调试构建) ===
              # Version = 日期 (YYYY.MM.DD)
              NEW_VER=$(date +"%Y.%m.%d")
              
              # Release = BuildNumber.git-ShortHash
              SHORT_SHA=$(git -C "$src_dir" rev-parse --short HEAD)
              NEW_REL="${{ github.run_number }}.git-$SHORT_SHA"
              echo "Build triggered by Commit: Using Version=$NEW_VER, Release=$NEW_REL"
            fi

            # 动态注入版本号
            sed -i "s|include \$(TOPDIR)/rules.mk|include \$(TOPDIR)/rules.mk\nPKG_VERSION:=$NEW_VER\nPKG_RELEASE:=$NEW_REL|" "$TARGET_MK"
          fi

          translation_pkg=${PACKAGE_NAME#luci-app-}
          mkdir -p ./bin/packages
          find ./bin/packages -type f -name "${PACKAGE_NAME}*.ipk" -delete
          find ./bin/packages -type f -name "luci-i18n-${translation_pkg}-*.ipk" -delete
          {
            echo "CONFIG_PACKAGE_${PACKAGE_NAME}=m"
            echo "CONFIG_PACKAGE_luci-i18n-${translation_pkg}-zh-cn=m"
            echo "CONFIG_LUCI_LANG_zh_Hans=y"
          } > .config
          make defconfig

      # 步骤 6: 编译软件包 (IPK)
      - name: Compile the package (IPK)
        working-directory: ${{ env.SDK_DIR }}
        run: |
          make package/${PACKAGE_NAME}/compile V=s -j$(($(nproc) + 1))
          
          mkdir -p output_ipk
          translation_pkg=${PACKAGE_NAME#luci-app-}
          find ./bin/packages -type f \( -name "${PACKAGE_NAME}*.ipk" -o -name "luci-i18n-${translation_pkg}-*.ipk" \) -exec cp {} output_ipk/ \;

      # 步骤 7: 检出 IPK 转 APK 转换器
      - name: Checkout IPK to APK converter
        uses: actions/checkout@v5
        with:
          repository: DomainDevelop/openwrt-ipk2apk
          ref: ${{ env.IPK2APK_CONVERTER_REF }}
          path: converter-src

      # 步骤 8: 将 IPK 转换为 APK (使用 openwrt-ipk2apk)
      - name: Convert IPK packages to APK
        working-directory: ${{ env.SDK_DIR }}
        run: |
          set -euo pipefail
          CONVERTER="${{ github.workspace }}/converter-src/openwrt-ipk2apk.py"
          test -f "$CONVERTER" || { echo "::error::Converter script not found at $CONVERTER"; exit 1; }
          mkdir -p output_apk
          shopt -s nullglob
          IPK_FILES=(output_ipk/*.ipk)
          if [ "${#IPK_FILES[@]}" -eq 0 ]; then
            echo "::warning::No .ipk files found in output_ipk/; skipping APK conversion"
          else
            for ipk in "${IPK_FILES[@]}"; do
              base_name="$(basename "$ipk" .ipk)"
              apk_out="output_apk/${base_name}.apk"
              echo "Converting '$ipk' -> '$apk_out'"
              python3 "$CONVERTER" "$ipk" -o "$apk_out"
              test -s "$apk_out" || { echo "::error::Conversion produced an empty or missing APK: $apk_out"; exit 1; }
            done
            echo "APK conversion complete:"
            ls -l output_apk/
          fi

      # 步骤 8b: 签名 APK (使用 ECDSA P-256 / SHA-1)
      # 设置 APK_SIGNING_KEY secret 以启用签名。未设置时跳过并输出警告。
      - name: Sign APK packages (ECDSA P-256)
        working-directory: ${{ env.SDK_DIR }}
        env:
          APK_SIGNING_KEY: ${{ secrets.APK_SIGNING_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${APK_SIGNING_KEY:-}" ]; then
            echo "::warning::APK_SIGNING_KEY secret is not configured."
            echo "::warning::APK packages will be unsigned. To install on OpenWrt 25.12:"
            echo "::warning::  apk add --no-network --allow-untrusted /tmp/<package>.apk"
            exit 0
          fi

          KEY_NAME="domaindevelop-cellmodem"
          SIGNER="${{ github.workspace }}/.github/scripts/sign_apk.py"
          test -f "$SIGNER" || { echo "::error::sign_apk.py not found: $SIGNER"; exit 1; }

          shopt -s nullglob
          APK_FILES=(output_apk/*.apk)
          if [ "${#APK_FILES[@]}" -eq 0 ]; then
            echo "::warning::No APK files to sign; skipping."
            exit 0
          fi

          TMPKEY="$(mktemp)"
          trap 'rm -f "$TMPKEY"' EXIT
          printf '%s' "$APK_SIGNING_KEY" > "$TMPKEY"

          FIRST=true
          for apk in "${APK_FILES[@]}"; do
            echo "Signing: $(basename "$apk")"
            if [ "$FIRST" = true ]; then
              python3 "$SIGNER" --key "$TMPKEY" --key-name "$KEY_NAME" \
                --pubkey "output_apk/${KEY_NAME}.ecdsa.pub" "$apk"
              FIRST=false
            else
              python3 "$SIGNER" --key "$TMPKEY" --key-name "$KEY_NAME" "$apk"
            fi
          done
          echo "All APKs signed."

      # 步骤 9: 收集和准备文件
      - name: Collect artifacts
        id: collect_artifacts
        working-directory: ${{ env.SDK_DIR }}
        run: |
          set -euo pipefail
          rm -rf upload
          mkdir -p upload
          
          if [ -d "output_ipk" ]; then
            echo "Copying IPK files..."
            cp output_ipk/*.ipk upload/ 2>/dev/null || true
          fi
          if [ -d "output_apk" ]; then
            echo "Copying APK files..."
            cp output_apk/*.apk upload/ 2>/dev/null || true
            # Include public key if signing was performed
            cp output_apk/*.ecdsa.pub upload/ 2>/dev/null || true
          fi
          
          if [ -z "$(ls -A upload)" ]; then
            echo "::error::No packages found!"
            ls -R ./bin/
            exit 1
          fi
          
          echo "Found packages:"
          ls -l upload/

          primary_ipk="$(find upload -maxdepth 1 -type f -name "${PACKAGE_NAME}_*.ipk" | head -n1)"
          if [ -z "$primary_ipk" ]; then
            primary_ipk="$(find upload -maxdepth 1 -type f -name '*.ipk' | head -n1)"
          fi
          primary_apk="$(find upload -maxdepth 1 -type f -name "${PACKAGE_NAME}_*.apk" | head -n1)"
          if [ -z "$primary_apk" ]; then
            primary_apk="$(find upload -maxdepth 1 -type f -name '*.apk' | head -n1)"
          fi
          primary_ipk="${primary_ipk##*/}"
          primary_apk="${primary_apk##*/}"

          signed=""
          if ls upload/*.ecdsa.pub >/dev/null 2>&1; then
            signed="yes"
          fi

          cat > upload/INSTALL.txt <<EOF
          Offline install of generated OpenWrt packages
          ============================================

          If your router uses opkg (OpenWrt 23.05.x and older):
            - upload / install the .ipk file
            - LuCI upload supports .ipk packages
            - SSH / USB install:
                opkg install /tmp/${primary_ipk:-package.ipk}

          If your router uses apk (OpenWrt 25.12.x and newer):
            - Use the .apk file.
            - LuCI's Software page runs: apk add /tmp/upload.apk
            - Custom unsigned APKs are rejected there with UNTRUSTED signature.

          EOF

          if [ "$signed" = "yes" ]; then
            cat >> upload/INSTALL.txt <<EOF
            This APK is SIGNED. Trusted offline install:
              a) Copy the public key to the router ONCE:
                   scp domaindevelop-cellmodem.ecdsa.pub root@ROUTER:/etc/apk/keys/
              b) Copy and install the APK:
                   scp ${primary_apk:-package.apk} root@ROUTER:/tmp/
                   ssh root@ROUTER "apk add --no-network /tmp/${primary_apk:-package.apk}"
          EOF
          else
            cat >> upload/INSTALL.txt <<EOF
            This APK is UNSIGNED (APK_SIGNING_KEY secret not configured).
            Install with:  apk add --no-network --allow-untrusted /tmp/${primary_apk:-package.apk}
          EOF
          fi

          cat >> upload/INSTALL.txt <<EOF

          If the Software page shows "No packages" or index download errors:
            - fix router network / DNS / firewall / NTP before expecting online installs.
          EOF
          
          echo "path=upload" >> $GITHUB_OUTPUT

      # 步骤 10: 上传构建产物
      - name: Upload artifacts
        uses: actions/upload-artifact@v5
        with:
          name: ${{ env.PACKAGE_NAME }}-${{ matrix.target.name }}
          path: ${{ env.SDK_DIR }}/${{ steps.collect_artifacts.outputs.path }}
          if-no-files-found: error

  release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v5
        with:
          path: release-assets

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            release-assets/**/*.ipk
            release-assets/**/*.apk
