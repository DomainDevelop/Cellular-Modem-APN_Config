name: Build OpenWrt Package

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - target_name: xe3000
            openwrt_version: "23.05.5"
            target: "mediatek"
            subtarget: "filogic"
            pkg_arch: "aarch64_cortex-a53"
            sdk_toolchain: "gcc-12.3.0_musl"

    steps:
      - name: Checkout package source
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential clang flex bison g++ gawk gcc-multilib g++-multilib \
            gettext git libncurses5-dev libssl-dev python3-setuptools rsync swig \
            unzip zlib1g-dev file wget jq xz-utils zstd

      - name: Cache OpenWrt SDK
        id: cache-sdk
        uses: actions/cache@v4
        with:
          path: openwrt-sdk
          key: ${{ runner.os }}-${{ matrix.openwrt_version }}-${{ matrix.target }}-${{ matrix.subtarget }}-sdk

      - name: Download and extract OpenWrt SDK
        if: steps.cache-sdk.outputs.cache-hit != 'true'
        run: |
          rm -rf openwrt-sdk sdk.tar.*
          SDK_URL="https://downloads.openwrt.org/releases/${{ matrix.openwrt_version }}/targets/${{ matrix.target }}/${{ matrix.subtarget }}/openwrt-sdk-${{ matrix.openwrt_version }}-${{ matrix.target }}-${{ matrix.subtarget }}_${{ matrix.sdk_toolchain }}.Linux-x86_64.tar.xz"
          wget -O sdk.tar.xz "$SDK_URL"
          mkdir -p openwrt-sdk
          tar -xf sdk.tar.xz -C openwrt-sdk --strip-components=1

      - name: Configure feeds and package source
        run: |
          cd openwrt-sdk
          echo "src-link custom $GITHUB_WORKSPACE" > feeds.conf.default
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Compile package
        run: |
          cd openwrt-sdk
          make defconfig
          make package/luci-app-ginet-cellmodem/compile V=s

      - name: Collect package artifacts
        run: |
          set -e
          mkdir -p artifacts
          PKG_DIR="openwrt-sdk/bin/packages/${{ matrix.pkg_arch }}/custom"
          cp "$PKG_DIR"/luci-app-ginet-cellmodem_*.ipk artifacts/
          (
            cd artifacts
            sha256sum *.ipk > SHA256SUMS
          )

      - name: Upload compiled package
        uses: actions/upload-artifact@v4
        with:
          name: luci-app-ginet-cellmodem_${{ matrix.openwrt_version }}_${{ matrix.target_name }}_${{ matrix.pkg_arch }}
          path: artifacts/*
          if-no-files-found: error
