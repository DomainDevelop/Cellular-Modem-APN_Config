name: Build OpenWrt Package

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
    - name: Checkout package source
      uses: actions/checkout@v4
      with:
        path: 'luci-app-ginet-cellmodem'

    - name: Update and install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential clang flex bison g++ gawk gcc-multilib g++-multilib \
          gettext git libncurses5-dev libssl-dev python3-setuptools rsync swig unzip zlib1g-dev file wget

    - name: Cache OpenWrt SDK
      id: cache-sdk
      uses: actions/cache@v4
      with:
        path: openwrt-sdk
        key: ${{ runner.os }}-openwrt-sdk-23.05.5-x86-64

    - name: Download and extract OpenWrt SDK
      if: steps.cache-sdk.outputs.cache-hit != 'true'
      run: |
        wget https://openwrt.org
        mkdir openwrt-sdk
        tar -xf openwrt-sdk-23.05.5-x86-64_gcc-12.3.0_musl.Linux-x86_64.tar.xz -C openwrt-sdk --strip-components=1

    - name: Configure custom package feed
      run: |
        cd openwrt-sdk
        
        # Link the checked-out package directory as a local source feed
        echo "src-link custom ../" > feeds.conf.default
        
        # Update and install feeds to pull dependencies like luci-base
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Compile package
      run: |
        cd openwrt-sdk
        
        # Generate the default configuration and select the package
        make defconfig
        make package/luci-app-ginet-cellmodem/compile V=s

    - name: Upload compiled IPK artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ginet-cellmodem-package
        path: openwrt-sdk/bin/packages/x86_64/custom/luci-app-ginet-cellmodem_*.ipk
