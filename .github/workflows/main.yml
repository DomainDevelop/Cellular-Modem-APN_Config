name: Build OpenWrt Package

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - openwrt_version: "24.10.7"
            target: "mediatek/filogic"
            target_slug: "mediatek-filogic"
            sdk_file: "openwrt-sdk-24.10.7-mediatek-filogic_gcc-13.3.0_musl.Linux-x86_64.tar.zst"
            xe3000_note: "Primary XE-3000 / Puli AX relevant target"
          - openwrt_version: "25.12.5"
            target: "mediatek/filogic"
            target_slug: "mediatek-filogic"
            sdk_file: "openwrt-sdk-25.12.5-mediatek-filogic_gcc-14.3.0_musl.Linux-x86_64.tar.zst"
            xe3000_note: "Latest stable OpenWrt release"
    env:
      SDK_URL: https://downloads.openwrt.org/releases/${{ matrix.openwrt_version }}/targets/${{ matrix.target }}/${{ matrix.sdk_file }}
      SDK_ARCHIVE: ${{ github.workspace }}/sdk-cache/${{ matrix.sdk_file }}
      SDK_DIR: ${{ github.workspace }}/openwrt-sdk-${{ matrix.openwrt_version }}-${{ matrix.target_slug }}
      PACKAGE_DIR: ${{ github.workspace }}/luci-app-ginet-cellmodem
      ARTIFACT_DIR: ${{ github.workspace }}/artifacts/luci-app-ginet-cellmodem-${{ matrix.openwrt_version }}-${{ matrix.target_slug }}

    steps:
      - name: Checkout package source
        uses: actions/checkout@v4
        with:
          path: luci-app-ginet-cellmodem

      - name: Install SDK build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison g++ gawk gcc-multilib g++-multilib \
            gettext git libncurses5-dev libssl-dev python3 rsync swig unzip zlib1g-dev file wget curl zstd

      - name: Cache OpenWrt SDK archive
        uses: actions/cache@v4
        with:
          path: ${{ env.SDK_ARCHIVE }}
          key: ${{ runner.os }}-${{ matrix.sdk_file }}

      - name: Download OpenWrt SDK archive
        run: |
          mkdir -p "$(dirname "$SDK_ARCHIVE")"
          if [ ! -f "$SDK_ARCHIVE" ]; then
            curl -fL --retry 5 --retry-delay 5 --retry-all-errors --connect-timeout 30 --max-time 1800 \
              -o "$SDK_ARCHIVE" "$SDK_URL"
          fi
          ls -lh "$SDK_ARCHIVE"

      - name: Extract OpenWrt SDK
        run: |
          rm -rf "$SDK_DIR"
          mkdir -p "$SDK_DIR"
          tar -xf "$SDK_ARCHIVE" -C "$SDK_DIR" --strip-components=1

      - name: Prepare package in SDK
        run: |
          cd "$SDK_DIR"
          rm -f package/luci-app-ginet-cellmodem
          ln -s "$PACKAGE_DIR" package/luci-app-ginet-cellmodem
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Compile package
        run: |
          cd "$SDK_DIR"
          make defconfig
          make package/luci-app-ginet-cellmodem/compile V=s

      - name: Collect IPK artifacts
        run: |
          mkdir -p "$ARTIFACT_DIR"
          find "$SDK_DIR/bin/packages" -type f \( -name 'luci-app-ginet-cellmodem*.ipk' -o -name 'luci-app-ginet-cellmodem*.apk' \) -exec cp {} "$ARTIFACT_DIR/" \;
          test -n "$(find "$ARTIFACT_DIR" -maxdepth 1 -type f \( -name '*.ipk' -o -name '*.apk' \) -print -quit)" || {
            echo "Error: No luci-app-ginet-cellmodem package files (.ipk or .apk) were produced"
            exit 1
          }
          cat > "$ARTIFACT_DIR/build-info.txt" <<INFO
          package=luci-app-ginet-cellmodem
          openwrt_version=${{ matrix.openwrt_version }}
          target=${{ matrix.target }}
          sdk_url=${SDK_URL}
          xe3000_note=${{ matrix.xe3000_note }}
          INFO
          find "$ARTIFACT_DIR" -maxdepth 1 -type f -print

      - name: Upload IPK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: luci-app-ginet-cellmodem-${{ matrix.openwrt_version }}-${{ matrix.target_slug }}
          path: ${{ env.ARTIFACT_DIR }}
          if-no-files-found: error
